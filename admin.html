<!DOCTYPE html>
<html>
<head>
    <title>SmartPark | Admin Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 30px; }
        .container { max-width: 1000px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #0f172a; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        th { background: #334155; color: #94a3b8; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Parking Management Dashboard</h1>
        
        <div class="grid">
            <div class="card">
                <h2 style="color:#22c55e">Parking History (Success)</h2>
                <table id="table-history"></table>
            </div>

            <div class="card">
                <h2 style="color:#ef4444">Cancelled Bookings</h2>
                <table id="table-cancelled"></table>
            </div>
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://smart-parking-system-b0f8f-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // 1. History (Success) පෙන්වීම
        db.ref('ParkingHistory').on('value', snap => {
            let html = "<tr><th>Slot</th><th>Vehicle</th><th>In Time</th></tr>";
            snap.forEach(child => {
                const val = child.val();
                html += `<tr><td>${val.slot}</td><td>${val.v}</td><td>${val.t}</td></tr>`;
            });
            document.getElementById('table-history').innerHTML = html;
        });

        // 2. Cancelled පෙන්වීම
        db.ref('CancelledBookings').on('value', snap => {
            let html = "<tr><th>Vehicle</th><th>NIC</th></tr>";
            snap.forEach(child => {
                const val = child.val();
                html += `<tr><td>${val.v}</td><td style="color:#94a3b8">${val.n}</td></tr>`;
            });
            document.getElementById('table-cancelled').innerHTML = html;
        });

        // 3. Logic: බුකින් එකක් සාර්ථකද නැද්ද කියලා තීරණය කිරීම
        setInterval(() => {
            db.ref('Slots').once('value', snap => {
                const slots = snap.val();
                const now = Date.now();
                for (let id in slots) {
                    const d = slots[id];
                    
                    // Case A: වාහනය ස්ලොට් එකට ආවා (Success)
                    if (d.status === "Booked" && d.sensorStatus === 1) {
                        db.ref('ParkingHistory').push({ slot:id, v:d.vehicleNo, t:new Date().toLocaleString() });
                        db.ref('Slots/'+id).remove(); // ස්ලොට් එක නිදහස් කිරීම
                    } 
                    // Case B: කාලය අවසන් වුණා, වාහනය ආවේ නැහැ (Cancel)
                    else if (d.expiresAt && now > d.expiresAt && d.sensorStatus === 0) {
                        db.ref('CancelledBookings').push({ v:d.vehicleNo, n:d.driverNIC });
                        db.ref('Slots/'+id).remove();
                    }
                }
            });
        }, 3000);
    </script>
</body>
</html>
