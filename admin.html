
<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark | Master Analytics</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #00d2ff; --warning: #ffde59; --danger: #ff4d4d; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0b0f1a; color: white; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        /* Stats Styling */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; backdrop-filter: blur(10px); }
        .stat-card i { font-size: 2rem; margin-bottom: 10px; color: var(--primary); }
        .stat-num { font-size: 2.5rem; font-weight: 800; display: block; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: #888; padding: 10px 25px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* Table Styling */
        .table-container { background: var(--glass); border-radius: 20px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; color: var(--primary); border-bottom: 2px solid rgba(255,255,255,0.1); font-size: 0.85rem; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem; }
        
        .badge { padding: 5px 12px; border-radius: 15px; font-size: 0.7rem; font-weight: 700; }
        .badge-success { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .badge-cancel { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        @media print { .no-print { display: none; } body { background: white; color: black; } table { color: black; border: 1px solid #ddd; } }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1 style="font-weight: 800; letter-spacing: 1px;">SMARTPARK <span style="color:var(--primary)">ANALYTICS</span></h1>
        <button class="no-print" onclick="window.print()" style="padding:12px 25px; background:var(--primary); border:none; border-radius:12px; font-weight:700; cursor:pointer;"><i class="fas fa-print"></i> PRINT REPORT</button>
    </div>

    <div class="stats-grid no-print">
        <div class="stat-card">
            <i class="fas fa-check-circle"></i>
            <span class="stat-num" id="count-success">0</span>
            <span style="color:#888">Successful Parkings</span>
        </div>
        <div class="stat-card">
            <i class="fas fa-times-circle" style="color:var(--danger)"></i>
            <span class="stat-num" id="count-cancelled" style="color:var(--danger)">0</span>
            <span style="color:#888">Cancelled (Timeout)</span>
        </div>
    </div>

    <div class="tabs no-print">
        <button id="tab1" class="tab-btn active" onclick="switchTab('success')">Successful Parkings</button>
        <button id="tab2" class="tab-btn" onclick="switchTab('cancelled')">Cancelled Bookings</button>
    </div>

    <div class="table-container">
        <div id="view-success">
            <table id="table-success">
                <thead>
                    <tr>
                        <th>Slot</th>
                        <th>Vehicle No</th>
                        <th>In Time</th>
                        <th>Out Time</th>
                        <th>Duration</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="body-success"></tbody>
            </table>
        </div>

        <div id="view-cancelled" style="display:none;">
            <table id="table-cancelled">
                <thead>
                    <tr>
                        <th>Vehicle No</th>
                        <th>Driver NIC</th>
                        <th>Booked At</th>
                        <th>Reason</th>
                    </tr>
                </thead>
                <tbody id="body-cancelled"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    var firebaseConfig = {
        apiKey: "AIzaSyBg6ewTUzkhpYQVttFQBdpYu2eV8MfSdWw",
        databaseURL: "https://smart-parking-system-b0f8f-default-rtdb.firebaseio.com/
",
        projectId: "smart-parking-system-b0f8f",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function switchTab(type) {
        document.getElementById('view-success').style.display = type === 'success' ? 'block' : 'none';
        document.getElementById('view-cancelled').style.display = type === 'cancelled' ? 'block' : 'none';
        document.getElementById('tab1').classList.toggle('active', type === 'success');
        document.getElementById('tab2').classList.toggle('active', type === 'cancelled');
    }

    // Load Data from Firebase
    function loadData() {
        // 1. සාර්ථක පාර්කින් දත්ත
        db.ref('ParkingHistory').on('value', snap => {
            const data = snap.val();
            const body = document.getElementById('body-success');
            body.innerHTML = "";
            let count = 0;
            for(let id in data) {
                count++;
                let r = data[id];
                let duration = calculateDuration(r.inTime, r.outTime);
                body.innerHTML += `<tr>
                    <td><b>${r.slotID}</b></td>
                    <td>${r.vehicleNo}</td>
                    <td>${r.inTime || 'Waiting'}</td>
                    <td>${r.outTime || '--'}</td>
                    <td>${duration}</td>
                    <td><span class="badge badge-success">Completed</span></td>
                </tr>`;
            }
            document.getElementById('count-success').innerText = count;
        });

        // 2. අවලංගු වූ දත්ත
        db.ref('CancelledBookings').on('value', snap => {
            const data = snap.val();
            const body = document.getElementById('body-cancelled');
            body.innerHTML = "";
            let count = 0;
            for(let id in data) {
                count++;
                let r = data[id];
                body.innerHTML += `<tr>
                    <td>${r.vehicleNo}</td>
                    <td>${r.driverNIC}</td>
                    <td>${r.bookedAt}</td>
                    <td><span class="badge badge-cancel">Timeout (1 min)</span></td>
                </tr>`;
            }
            document.getElementById('count-cancelled').innerText = count;
        });
    }

    function calculateDuration(inT, outT) {
        if(!inT || !outT) return "N/A";
        let diff = new Date(outT) - new Date(inT);
        let mins = Math.floor(diff / 60000);
        return mins + " mins";
    }

    loadData();
</script>
</body>
</html>
