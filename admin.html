<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark | Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --danger: #ff4d4d; --glass: rgba(255, 255, 255, 0.1); }
        
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0f172a; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .admin-card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 40px; border-radius: 30px; width: 95%; max-width: 1000px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        h1 { background: linear-gradient(to right, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin: 0 0 20px 0; font-weight: 800; }
        
        .login-box { text-align: center; max-width: 350px; margin: auto; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; outline: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 25px; background: rgba(0,0,0,0.2); border-radius: 15px; overflow: hidden; }
        th { background: rgba(255,255,255,0.1); padding: 18px; text-align: left; color: var(--primary); font-size: 0.9rem; border-bottom: 2px solid var(--primary); }
        td { padding: 15px 18px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        
        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; font-family: 'Poppins'; }
        .btn-release { background: var(--danger); color: white; }
        .btn-release:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--danger); }
        .btn-login { background: var(--primary); color: #0f172a; width: 100%; margin-top: 10px; }
        .btn-print { background: #22c55e; color: white; }

        .hide { display: none !important; }

        @media print {
            body { background: white !important; color: black !important; }
            .btn, .login-box, h1 { display: none !important; }
            .admin-card { border: none; box-shadow: none; backdrop-filter: none; background: white; width: 100%; padding: 0; }
            table { color: black; border: 1px solid #333; }
            th { background: #f0f0f0 !important; color: black !important; border-bottom: 2px solid black; }
            td { border-bottom: 1px solid #ccc; }
        }
    </style>
</head>
<body>

<div class="admin-card">
    <div id="admin-login" class="login-box">
        <i class="fas fa-user-shield fa-3x" style="color: var(--primary); margin-bottom: 15px;"></i>
        <h1>Admin Login</h1>
        <input type="text" id="adm-user" placeholder="Username">
        <input type="password" id="adm-pass" placeholder="Password">
        <button class="btn btn-login" onclick="handleLogin()">LOGIN TO DASHBOARD</button>
    </div>

    <div id="admin-dashboard" class="hide">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
            <h1 style="margin: 0;">Live Bookings</h1>
            <button class="btn btn-print" onclick="window.print()">
                <i class="fas fa-file-pdf"></i> PRINT ANALYSIS
            </button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>SLOT</th>
                    <th>BOOKING ID</th>
                    <th>VEHICLE NO</th>
                    <th>DRIVER NIC</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody id="admin-table-body">
                </tbody>
        </table>
    </div>
</div>

<script>
 
    var firebaseConfig = {
        apiKey: "AIzaSyBg6ewTUzkhpYQVttFQBdpYu2eV8MfSdWw",
        databaseURL: "https://smart-parking-system-b0f8f-default-rtdb.firebaseio.com/",
        projectId: "smart-parking-system-b0f8f",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Login Credentials
    const U = "admin";
    const P = "shop123";

    function handleLogin() {
        let user = document.getElementById('adm-user').value;
        let pass = document.getElementById('adm-pass').value;

        if(user === U && pass === P) {
            document.getElementById('admin-login').classList.add('hide');
            document.getElementById('admin-dashboard').classList.remove('hide');
            listenToData();
        } else {
            alert("Not allowed! The data is incorrect.");
        }
    }

    function listenToData() {
        db.ref('Slots').on('value', snapshot => {
            const data = snapshot.val();
            const tableBody = document.getElementById('admin-table-body');
            tableBody.innerHTML = "";

            if (!data) {
                tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>There are currently no bookings.</td></tr>";
                return;
            }

            for (let id in data) {
                if(data[id].status === "Booked") {
                    let row = `<tr>
                        <td><b style="color:var(--primary)">${id}</b></td>
                        <td>${data[id].bookingID}</td>
                        <td style="font-weight:600;">${data[id].vehicleNo}</td>
                        <td>${data[id].driverNIC}</td>
                        <td><button class="btn btn-release" onclick="releaseSlot('${id}')">RELEASE</button></td>
                    </tr>`;
                    tableBody.innerHTML += row;
                }
            }
        });
    }

    function releaseSlot(slotID) {
        if(confirm(slotID + " Free up the slot?")) {
            db.ref('Slots/' + slotID).remove().then(() => {
                alert("The slot was successfully freed!");
            });
        }
    }
</script>
</body>
</html>
