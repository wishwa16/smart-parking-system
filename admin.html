<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartPark | Admin Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --success: #22c55e; --danger: #ef4444; --bg: #0b121f; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { color: var(--primary); border-bottom: 2px solid #1e293b; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .text-success { color: var(--success); font-weight: bold; }
        .text-danger { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

    <h1>Master Admin Dashboard</h1>
    <p id="status-msg" style="color: #888;">System Monitoring Active...</p>

    <div class="grid">
        <div class="card">
            <h2 style="color: var(--success)">Parking History (Success)</h2>
            <table>
                <thead><tr><th>Slot</th><th>Vehicle No</th><th>In Time</th></tr></thead>
                <tbody id="body-success"></tbody>
            </table>
        </div>

        <div class="card">
            <h2 style="color: var(--danger)">Cancelled History (No-Show)</h2>
            <table>
                <thead><tr><th>Vehicle No</th><th>NIC</th><th>Reason</th></tr></thead>
                <tbody id="body-cancel"></tbody>
            </table>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg6ewTUzkhpYQVttFQBdpYu2eV8MfSdWw",
        databaseURL: "https://smart-parking-system-b0f8f-default-rtdb.firebaseio.com/",
        projectId: "smart-parking-system-b0f8f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- CRITICAL MONITORING LOGIC ---
    // Every 5 seconds, check all slots for timeouts
    setInterval(() => {
        db.ref('Slots').once('value', snap => {
            const slots = snap.val();
            const now = Date.now();

            for (let id in slots) {
                const data = slots[id];
                // If time is up AND vehicle hasn't arrived (sensorStatus is 0)
                if (data.expiresAt && now > data.expiresAt && data.sensorStatus === 0) {
                    console.log("Expiring Slot: " + id);
                    
                    // 1. Copy data to CancelledBookings
                    db.ref('CancelledBookings').push({
                        vehicleNo: data.vehicleNo,
                        driverNIC: data.driverNIC,
                        bookedAt: data.bookedAt,
                        reason: "Timeout - No Show",
                        slotID: id
                    }).then(() => {
                        // 2. Clear the slot so it becomes available again
                        db.ref('Slots/' + id).remove();
                    });
                }
            }
        });
    }, 5000);

    // --- Display Data ---
    db.ref('ParkingHistory').on('value', snap => {
        let html = "";
        snap.forEach(child => {
            const r = child.val();
            html += `<tr><td><b>${r.slotID || 'S1'}</b></td><td>${r.vehicleNo}</td><td class="text-success">${r.inTime}</td></tr>`;
        });
        document.getElementById('body-success').innerHTML = html;
    });

    db.ref('CancelledBookings').on('value', snap => {
        let html = "";
        snap.forEach(child => {
            const r = child.val();
            html += `<tr><td>${r.vehicleNo}</td><td>${r.driverNIC}</td><td class="text-danger">NOT ARRIVED</td></tr>`;
        });
        document.getElementById('body-cancel').innerHTML = html;
    });
</script>
</body>
</html>
