<!DOCTYPE html>
<html>
<head>
    <title>SmartPark | Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0b121f; color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; }
    </style>
</head>
<body>
    <h1>Master Admin Dashboard</h1>
    <div class="grid">
        <div class="card">
            <h2 style="color:#22c55e">Success</h2>
            <table id="table-success"></table>
        </div>
        <div class="card">
            <h2 style="color:#ef4444">Cancelled</h2>
            <table id="table-cancel"></table>
        </div>
    </div>
    <script>
        const config = { databaseURL: "https://smart-parking-system-b0f8f-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        setInterval(() => {
            db.ref('Slots').once('value', snap => {
                const slots = snap.val();
                const now = Date.now();
                for (let id in slots) {
                    const d = slots[id];
                    if (d.status === "Booked" && d.sensorStatus === 0 && d.wasOccupied) {
                        db.ref('ParkingHistory').push({ slot:id, v:d.vehicleNo, t:new Date().toLocaleString() });
                        db.ref('Slots/'+id).remove();
                    } else if (d.expiresAt && now > d.expiresAt && d.sensorStatus === 0 && !d.wasOccupied) {
                        db.ref('CancelledBookings').push({ v:d.vehicleNo, n:d.driverNIC });
                        db.ref('Slots/'+id).remove();
                    }
                }
            });
        }, 3000);

        db.ref('ParkingHistory').on('value', s => {
            let h = "<tr><th>Slot</th><th>Vehicle</th><th>Time</th></tr>";
            s.forEach(c => { const r = c.val(); h += `<tr><td>${r.slot}</td><td>${r.v}</td><td>${r.t}</td></tr>`; });
            document.getElementById('table-success').innerHTML = h;
        });

        db.ref('CancelledBookings').on('value', s => {
            let h = "<tr><th>Vehicle</th><th>NIC</th></tr>";
            s.forEach(c => { const r = c.val(); h += `<tr><td>${r.v}</td><td>${r.n}</td></tr>`; });
            document.getElementById('table-cancel').innerHTML = h;
        });
    </script>
</body>
</html>
