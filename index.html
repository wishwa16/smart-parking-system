<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark | Admin Master Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #00d2ff; --danger: #ff4d4d; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0b121f; color: white; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--glass); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .stat-card h3 { font-size: 0.8rem; color: #888; margin: 0; }
        .stat-num { font-size: 2rem; font-weight: 800; color: var(--primary); display: block; margin-top: 5px; }

        /* Tabs Navigation */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 5px; border-radius: 12px; width: fit-content; }
        .tab-btn { background: none; border: none; color: #888; padding: 10px 20px; cursor: pointer; font-size: 0.9rem; font-weight: 600; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #0b121f; }

        /* Table Design */
        .table-container { background: var(--glass); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--primary); border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.85rem; }
        
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; }
        .badge-success { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .badge-cancel { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        .login-box { text-align: center; max-width: 350px; margin: 100px auto; padding: 30px; background: var(--glass); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; }
        .hide { display: none !important; }
        @media print { .no-print { display: none; } body { background: white; color: black; } table { color: black; border: 1px solid #ddd; } }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section" class="login-box">
        <i class="fas fa-user-lock fa-3x" style="color: var(--primary); margin-bottom: 15px;"></i>
        <h2>Admin Login</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()" style="width:100%; padding:12px; background:var(--primary); border:none; border-radius:10px; font-weight:700; cursor:pointer; margin-top:10px;">LOGIN</button>
    </div>

    <div id="dashboard-section" class="hide">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h1 style="margin: 0; font-weight: 800;">SmartPark <span style="color:var(--primary)">Analytics</span></h1>
            <button class="no-print" onclick="window.print()" style="padding:10px 20px; background:var(--primary); border:none; border-radius:10px; font-weight:700; cursor:pointer;"><i class="fas fa-print"></i> PRINT REPORT</button>
        </div>

        <div class="stats-grid no-print">
            <div class="stat-card"><h3>SUCCESSFUL PARKINGS</h3><span class="stat-num" id="stat-ok">0</span></div>
            <div class="stat-card"><h3>CANCELLED (TIMEOUT)</h3><span class="stat-num" id="stat-fail" style="color:var(--danger)">0</span></div>
        </div>

        <div class="tabs no-print">
            <button id="t1" class="tab-btn active" onclick="show('success')">Parking History</button>
            <button id="t2" class="tab-btn" onclick="show('cancelled')">Cancelled Bookings</button>
        </div>

        <div class="table-container">
            <div id="view-success">
                <table>
                    <thead>
                        <tr><th>Slot</th><th>Vehicle No</th><th>In Time</th><th>Out Time</th><th>Duration</th><th>Status</th></tr>
                    </thead>
                    <tbody id="body-success"></tbody>
                </table>
            </div>

            <div id="view-cancelled" class="hide">
                <table>
                    <thead>
                        <tr><th>Vehicle No</th><th>Driver NIC</th><th>Booked At</th><th>Reason</th></tr>
                    </thead>
                    <tbody id="body-cancelled"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Paste your Firebase Config here ---
    var firebaseConfig = {
        apiKey: "AIzaSyBg6ewTUzkhpYQVttFQBdpYu2eV8MfSdWw",,
        databaseURL: "https://smart-parking-system-b0f8f-default-rtdb.firebaseio.com/";
        projectId: "smart-parking-system-b0f8f",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function login() {
        let u = document.getElementById('user').value;
        let p = document.getElementById('pass').value;
        if(u === "admin" && p === "shop123") {
            document.getElementById('login-section').classList.add('hide');
            document.getElementById('dashboard-section').classList.remove('hide');
            startSync();
        } else { alert("Login Failed!"); }
    }

    function show(type) {
        document.getElementById('view-success').classList.toggle('hide', type !== 'success');
        document.getElementById('view-cancelled').classList.toggle('hide', type !== 'cancelled');
        document.getElementById('t1').classList.toggle('active', type === 'success');
        document.getElementById('t2').classList.toggle('active', type === 'cancelled');
    }

    function startSync() {
        // 1. Success History Load
        db.ref('ParkingHistory').on('value', snap => {
            const data = snap.val();
            const body = document.getElementById('body-success');
            body.innerHTML = "";
            let count = 0;
            if(data) {
                for(let id in data) {
                    count++;
                    let r = data[id];
                    body.innerHTML += `<tr>
                        <td><b>${r.slotID}</b></td><td>${r.vehicleNo}</td>
                        <td>${r.inTime || '--'}</td><td>${r.outTime || '--'}</td>
                        <td>${calculateMins(r.inTime, r.outTime)}</td>
                        <td><span class="badge badge-success">Completed</span></td>
                    </tr>`;
                }
            }
            document.getElementById('stat-ok').innerText = count;
        });

        // 2. Cancelled History Load
        db.ref('CancelledBookings').on('value', snap => {
            const data = snap.val();
            const body = document.getElementById('body-cancelled');
            body.innerHTML = "";
            let count = 0;
            if(data) {
                for(let id in data) {
                    count++;
                    let r = data[id];
                    body.innerHTML += `<tr>
                        <td>${r.vehicleNo}</td><td>${r.driverNIC}</td>
                        <td>${r.bookedAt}</td><td><span class="badge badge-cancel">Timeout</span></td>
                    </tr>`;
                }
            }
            document.getElementById('stat-fail').innerText = count;
        });
    }

    function calculateMins(inT, outT) {
        if(!inT || !outT) return "0 mins";
        let diff = new Date(outT) - new Date(inT);
        return Math.floor(diff / 60000) + " mins";
    }
</script>
</body>
</html>
