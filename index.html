<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark | User Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --available: #22c55e; --booked: #ef4444; --bg: #0f172a; --primary: #00d2ff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; outline: none; border: 1px solid rgba(255,255,255,0.1); }
        .section-title { font-size: 0.9rem; font-weight: 600; margin: 15px 0 10px 0; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .slot-list { display: flex; flex-direction: column; gap: 10px; }
        .slot-item { padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); }
        .btn-book { padding: 8px 15px; background: var(--available); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; }
        #timer { font-size: 3.5rem; font-weight: 800; color: #ffde59; margin: 10px 0; }
        #qr-box { background: white; padding: 10px; border-radius: 10px; display: inline-block; }
        .hide { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="ui-selection">
        <h1 style="text-align: center; margin-bottom: 5px;">SmartPark</h1>
        <p style="text-align: center; font-size: 0.8rem; color: #888; margin-bottom: 25px;">Real-time Slot Booking</p>
        
        <div class="card">
            <h3 style="margin-top:0">Vehicle Information</h3>
            <input type="text" id="v_no" placeholder="Vehicle Number (e.g. CAB-1234)">
            <input type="text" id="d_nic" placeholder="Driver NIC Number">
        </div>

        <div class="section-title"><div class="dot" style="background: var(--available);"></div> Available Slots</div>
        <div id="available-list" class="slot-list"></div>

        <div class="section-title"><div class="dot" style="background: var(--booked);"></div> Currently Occupied</div>
        <div id="booked-list" class="slot-list"></div>
    </div>

    <div id="ui-active" class="hide" style="text-align: center;">
        <div class="card">
            <h2 style="color: var(--available); margin-bottom:0">Reserved!</h2>
            <div id="timer">01:00</div>
            <div id="qr-box"></div>
            <p style="color: #ff4d4d; font-size: 0.85rem; margin-top: 20px; font-weight: 600;">
                Hurry! Park your vehicle within 1 minute or your slot will be released.
            </p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg6ewTUzkhpYQVttFQBdpYu2eV8MfSdWw",
        authDomain: "smart-parking-system-b0f8f.firebaseapp.com",
        databaseURL: "https://smart-parking-system-b0f8f-default-rtdb.firebaseio.com/",
        projectId: "smart-parking-system-b0f8f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Sync Slots with Database
    db.ref('Slots').on('value', snap => {
        const slots = snap.val();
        const availList = document.getElementById('available-list');
        const bookList = document.getElementById('booked-list');
        availList.innerHTML = ""; bookList.innerHTML = "";

        const allSlots = ['S1', 'S2', 'S3']; 

        allSlots.forEach(id => {
            const isBooked = slots && slots[id] && slots[id].status === "Booked";
            if (isBooked) {
                bookList.innerHTML += `<div class="slot-item" style="border-left: 4px solid var(--booked);">
                    <span><b>${id}</b> - ${slots[id].vehicleNo}</span>
                    <span style="color:var(--booked); font-weight:800; font-size:0.7rem;">BOOKED</span>
                </div>`;
            } else {
                availList.innerHTML += `<div class="slot-item" style="border-left: 4px solid var(--available);">
                    <span><b>${id}</b></span>
                    <button class="btn-book" onclick="startBooking('${id}')">BOOK NOW</button>
                </div>`;
            }
        });
    });

    // 2. Booking Function with Auto-Reset
    function startBooking(slotID) {
        const v = document.getElementById('v_no').value.trim();
        const n = document.getElementById('d_nic').value.trim();
        if (!v || !n) return alert("Please fill details first!");

        const bookingTime = new Date().toLocaleString();
        const expiresAt = Date.now() + 60000; // 1 Minute

        db.ref('Slots/' + slotID).set({
            status: "Booked",
            vehicleNo: v,
            driverNIC: n,
            bookedAt: bookingTime,
            sensorStatus: 0,
            expiresAt: expiresAt
        }).then(() => {
            document.getElementById('ui-selection').classList.add('hide');
            document.getElementById('ui-active').classList.remove('hide');
            new QRCode(document.getElementById("qr-box"), {text: v, width: 120, height: 120});

            const timerInt = setInterval(() => {
                const timeLeft = expiresAt - Date.now();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInt);
                    // Check if vehicle arrived (ESP32 sets sensorStatus to 1)
                    db.ref('Slots/' + slotID).once('value', snapshot => {
                        const currentData = snapshot.val();
                        if (currentData && currentData.sensorStatus === 0) {
                            // Move to Cancelled List in Database
                            db.ref('CancelledBookings').push({
                                vehicleNo: v,
                                driverNIC: n,
                                slotID: slotID,
                                bookedAt: bookingTime,
                                reason: "Timeout (Not Arrived)"
                            }).then(() => {
                                // Reset Slot and Refresh Page
                                db.ref('Slots/' + slotID).remove();
                                alert("Time expired! Your slot has been released.");
                                location.reload(); 
                            });
                        }
                    });
                } else {
                    let seconds = Math.floor(timeLeft / 1000);
                    document.getElementById('timer').innerText = `00:${seconds < 10 ? '0' : ''}${seconds}`;
                }
            }, 1000);
        });
    }
</script>
</body>
</html>
