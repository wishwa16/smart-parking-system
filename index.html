<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark | Booking Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --available: #22c55e; --booked: #ef4444; --bg: #0f172a; --primary: #00d2ff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; padding: 20px; text-align: center; }
        .container { max-width: 450px; margin: auto; }
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; outline: none; border: 1px solid rgba(255,255,255,0.1); }
        
        .slot-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        .slot-card { padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); }
        
        .btn-book { padding: 10px 20px; background: var(--available); border: none; border-radius: 8px; color: white; font-weight: 800; cursor: pointer; }
        .status-tag { font-weight: 800; font-size: 0.8rem; padding: 5px 10px; border-radius: 5px; }
        .booked { color: var(--booked); border: 1px solid var(--booked); }

        #timer { font-size: 3.5rem; font-weight: 800; color: #ffde59; margin: 15px 0; }
        #qr-box { background: white; padding: 15px; border-radius: 15px; display: inline-block; }
        .hide { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="ui-selection">
        <h1>SmartPark</h1>
        <div class="card">
            <h3>Driver Details</h3>
            <input type="text" id="v_no" placeholder="Vehicle Number (CAB-1234)">
            <input type="text" id="d_nic" placeholder="Driver NIC">
        </div>

        <h3 style="text-align: left; margin-left: 10px;">Select a Slot</h3>
        <div id="slot-list" class="slot-grid">
            </div>
    </div>

    <div id="ui-active" class="hide">
        <div class="card">
            <h2 style="color: var(--available);">Booking Reserved</h2>
            <div id="timer">01:00</div>
            <div id="qr-box"></div>
            <p style="color: #ef4444; font-weight: 600;">Arrive within 1 minute!</p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg6ewTUzkhpYQVttFQBdpYu2eV8MfSdWw",
        authDomain: "smart-parking-system-b0f8f.firebaseapp.com",
        databaseURL: "https://smart-parking-system-b0f8f-default-rtdb.firebaseio.com/",
        projectId: "smart-parking-system-b0f8f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Load and Listen to Slots (S1, S2, S3)
    db.ref('Slots').on('value', snap => {
        const slotsData = snap.val() || {};
        const slotList = document.getElementById('slot-list');
        slotList.innerHTML = "";

        const slots = ['S1', 'S2', 'S3'];

        slots.forEach(id => {
            const isBooked = slotsData[id] && slotsData[id].status === "Booked";
            
            let slotHTML = `
                <div class="slot-card">
                    <span><b>Slot ${id}</b></span>
                    ${isBooked 
                        ? `<span class="status-tag booked">BOOKED</span>` 
                        : `<button class="btn-book" onclick="startBooking('${id}')">BOOK NOW</button>`}
                </div>`;
            slotList.innerHTML += slotHTML;
        });
    });

    function startBooking(slotID) {
        const v = document.getElementById('v_no').value.trim();
        const n = document.getElementById('d_nic').value.trim();
        if (!v || !n) return alert("Please enter Vehicle Number and NIC!");

        const expiresAt = Date.now() + 60000;
        const bTime = new Date().toLocaleString();

        db.ref('Slots/' + slotID).set({
            status: "Booked",
            vehicleNo: v,
            driverNIC: n,
            bookedAt: bTime,
            sensorStatus: 0,
            expiresAt: expiresAt
        }).then(() => {
            document.getElementById('ui-selection').classList.add('hide');
            document.getElementById('ui-active').classList.remove('hide');
            new QRCode(document.getElementById("qr-box"), { text: v, width: 120, height: 120 });

            const x = setInterval(() => {
                const now = Date.now();
                const diff = expiresAt - now;

                if (diff <= 0) {
                    clearInterval(x);
                    alert("Time's up! Your booking has expired.");
                    location.reload();
                } else {
                    let sec = Math.floor(diff / 1000);
                    document.getElementById('timer').innerText = `00:${sec < 10 ? '0' : ''}${sec}`;
                }
            }, 1000);
        });
    }
</script>
</body>
</html>
