<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark | Premium Booking</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Poppins', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1506521781263-d8422e82f27a?auto=format&fit=crop&q=80&w=1500'); background-size: cover; background-position: center; }
        .main-card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 40px; border-radius: 30px; text-align: center; width: 90%; max-width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); animation: fadeIn 1s ease-out; }
        .header-anim { font-size: 2.2rem; font-weight: 800; background: linear-gradient(to right, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: float 3s ease-in-out infinite; text-transform: uppercase; margin: 0; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .slot-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; }
        .parking-slot { background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1); padding: 20px 10px; border-radius: 15px; cursor: pointer; transition: 0.4s; color: white; }
        .parking-slot:hover { transform: translateY(-5px); background: var(--primary); box-shadow: 0 0 20px var(--primary); border-color: white; }
        .booked { background: rgba(239, 68, 68, 0.2) !important; border-color: #ef4444 !important; cursor: not-allowed; opacity: 0.6; }
        #timer-display { font-size: 2.8rem; color: #ffde59; font-weight: 800; margin: 15px 0; text-shadow: 0 0 15px rgba(255, 222, 89, 0.4); }
        #qrcode-box { background: white; padding: 15px; border-radius: 20px; display: inline-block; margin: 10px 0; border: 4px solid var(--primary); }
        .warning-msg { color: #ff4d4d; font-weight: 600; font-size: 0.85rem; background: rgba(255, 77, 77, 0.1); padding: 10px; border-radius: 10px; margin-top: 10px; line-height: 1.4; border: 1px solid rgba(255, 77, 77, 0.2); }
        .hide { display: none; }
    </style>
</head>
<body>

<div class="main-card">
    <div id="ui-home">
        <h1 class="header-anim">Smart Parking</h1>
        <p style="color: #bbb; letter-spacing: 2px; font-size: 0.8rem; margin-top: 10px; font-weight: 600;">BOOK YOUR OWN SLOT</p>
        <div class="slot-container">
            <div id="S1" class="parking-slot" onclick="bookNow('S1')"><i class="fas fa-car"></i><br>S-01</div>
            <div id="S2" class="parking-slot" onclick="bookNow('S2')"><i class="fas fa-car"></i><br>S-02</div>
            <div id="S3" class="parking-slot" onclick="bookNow('S3')"><i class="fas fa-car"></i><br>S-03</div>
        </div>
    </div>

    <div id="ui-booking" class="hide">
        <h2 style="color: #00d2ff; margin-bottom: 0;">Booking Active!</h2>
        <div id="timer-display">01:00</div>
        <div id="qrcode-box"></div>
        <div class="warning-msg">
            <i class="fas fa-exclamation-triangle"></i><br>
           Please stop the vehicle within one minute. Or your booking will be cancelled!
        </div>
    </div>
</div>

<script>
    
    var firebaseConfig = {
        apiKey: "AIzaSyBg6ewTUzkhpYQVttFQBdpYu2eV8MfSdWw",
        databaseURL: "https://smart-parking-system-b0f8f-default-rtdb.firebaseio.com/",
        projectId: "smart-parking-system-b0f8f",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let timerRef;

    function bookNow(id) {
        let bID = "PK-" + Math.floor(1000 + Math.random() * 9000);
        let expire = Date.now() + 60000; 

        db.ref('Slots/' + id).set({
            status: "Booked",
            bookingID: bID,
            expiresAt: expire,
            sensorStatus: 0 // 0 = Empty, 1 = Parked
        }).then(() => {
            document.getElementById('ui-home').classList.add('hide');
            document.getElementById('ui-booking').classList.remove('hide');
            
            // QR Generator
            document.getElementById("qrcode-box").innerHTML = "";
            new QRCode(document.getElementById("qrcode-box"), { 
                text: bID, 
                width: 140, 
                height: 140,
                colorDark : "#0f172a",
                colorLight : "#ffffff"
            });
            
            startTimer(expire, id);
        }).catch(e => alert("Error: " + e.message));
    }

    function startTimer(expire, id) {
        timerRef = setInterval(() => {
            let now = Date.now();
            let diff = expire - now;

            if (diff <= 0) {
                clearInterval(timerRef);
                checkCancellation(id);
            } else {
                let s = Math.floor(diff / 1000);
                document.getElementById('timer-display').innerText = `00:${s < 10 ? '0' : ''}${s}`;
            }
        }, 1000);
    }

    function checkCancellation(id) {
        db.ref('Slots/' + id).once('value', snapshot => {
            const data = snapshot.val();
            
            if (data && data.sensorStatus === 0) {
                db.ref('Slots/' + id).remove().then(() => {
                    alert("⚠️ Time is up! You did not stop the vehicle in time. Your booking has been cancelled.");
                    location.reload();
                });
            } else {
                alert("✅ Vehicle detected successfully! thank you.");
            }
        });
    }

    
    db.ref('Slots').on('value', snapshot => {
        let slots = snapshot.val();
        for (let x in slots) {
            let el = document.getElementById(x);
            if (el && slots[x].status === "Booked") {
                el.classList.add('booked');
                el.innerHTML = '<i class="fas fa-lock"></i><br>FULL';
                el.onclick = null;
            }
        }
    });
</script>
</body>
</html>
