<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark | Booking Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --available: #22c55e; --booked: #ef4444; --bg: #0f172a; --primary: #00d2ff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; padding: 20px; text-align: center; }
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); max-width: 450px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; }
        .slot-btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; background: var(--available); color: white; font-weight: 800; cursor: pointer; transition: 0.3s; }
        #timer { font-size: 3.5rem; font-weight: 800; color: #ffde59; margin: 15px 0; }
        #qr-box { background: white; padding: 15px; border-radius: 15px; display: inline-block; margin: 10px; }
        .hide { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="ui-selection">
        <h1>SmartPark</h1>
        <p style="color: #888;">Enter details and select a slot</p>
        <div class="card">
            <input type="text" id="v_no" placeholder="Vehicle Number (e.g. CAB-1234)">
            <input type="text" id="d_nic" placeholder="Driver NIC Number">
            <div id="slot-container" style="margin-top:20px">
                <button class="slot-btn" onclick="startBooking('S1')">BOOK SLOT S1</button>
            </div>
        </div>
    </div>

    <div id="ui-active" class="hide">
        <div class="card">
            <h2 style="color: var(--available);">Booking Reserved</h2>
            <div id="timer">01:00</div>
            <div id="qr-box"></div>
            <p style="color: #ef4444; font-weight: 600;">Arrive within 1 minute!</p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg6ewTUzkhpYQVttFQBdpYu2eV8MfSdWw",
        authDomain: "smart-parking-system-b0f8f.firebaseapp.com",
        databaseURL: "https://smart-parking-system-b0f8f-default-rtdb.firebaseio.com/",
        projectId: "smart-parking-system-b0f8f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function startBooking(slotID) {
        const v = document.getElementById('v_no').value.trim();
        const n = document.getElementById('d_nic').value.trim();
        if (!v || !n) return alert("Please fill all details!");

        const bookingTime = new Date().toLocaleString();
        const expiresAt = Date.now() + 60000; 

        db.ref('Slots/' + slotID).set({
            status: "Booked",
            vehicleNo: v,
            driverNIC: n,
            bookedAt: bookingTime,
            sensorStatus: 0,
            expiresAt: expiresAt
        }).then(() => {
            document.getElementById('ui-selection').classList.add('hide');
            document.getElementById('ui-active').classList.remove('hide');
            new QRCode(document.getElementById("qr-box"), { text: v, width: 128, height: 128 });

            const timerInt = setInterval(() => {
                const diff = expiresAt - Date.now();
                if (diff <= 0) {
                    clearInterval(timerInt);
                    // The Admin page logic will handle the actual data move to ensure consistency
                    alert("Timeout! Your booking has expired.");
                    location.reload();
                } else {
                    let sec = Math.floor(diff / 1000);
                    document.getElementById('timer').innerText = `00:${sec < 10 ? '0' : ''}${sec}`;
                }
            }, 1000);
        });
    }
</script>
</body>
</html>
